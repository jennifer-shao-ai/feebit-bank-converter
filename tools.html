<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn-hamburger" onclick="openSidebar()">☰</button>

  </div>

    <p style="color:var(--gray-600);font-size:14px;margin-bottom:20px">儀表板中所有用到的工具，點擊前往各平台</p>
    <div id="tools-list"></div>
  </div>
</div>
<script>
const TOOLS_DATA = [
  { icon:'🐙', name:'GitHub', category:'開發 / 版本控制', desc:'儀表板原始碼管理，所有程式碼變更與版本記錄都在這裡', url:'https://github.com/jennifer-shao-ai/feebit-bank-converter', related:['整體工具箱'] },
  { icon:'🌐', name:'GitHub Pages', category:'部署 / 網站託管', desc:'靜態網站免費部署，推送 main 分支後自動上線', url:'https://jennifer-shao-ai.github.io/feebit-bank-converter/', related:['整體工具箱'] },
  { icon:'🤖', name:'Claude Code', category:'開發 / AI 助手', desc:'用於撰寫、調整、優化儀表板所有功能與介面', url:'https://claude.ai/code', related:['整體工具箱'] },
];
const container = document.getElementById('tools-list');
const groups = {};
TOOLS_DATA.forEach(t => { if (!groups[t.category]) groups[t.category]=[]; groups[t.category].push(t); });
let html = '';
Object.entries(groups).forEach(([cat, tools]) => {
  html += `<div class="tools-section-title">${cat}</div><div class="tools-grid">`;
  tools.forEach(t => {
    html += `<div class="tool-card"><div class="tool-card-header"><div class="tool-card-icon">${t.icon}</div><div class="tool-card-meta"><div class="name">${t.name}</div></div></div><div class="tool-card-desc">${t.desc}</div><div class="tool-card-related">${t.related.map(r=>`<span class="tool-tag">${r}</span>`).join('')}</div><a class="tool-card-link" href="${t.url}" target="_blank" rel="noopener">前往 →</a></div>`;
  });
  html += `</div>`;
});
container.innerHTML = html;
</script>
<script>function copyShare(b){navigator.clipboard.writeText(location.origin+location.pathname+"?share").then(()=>{b.textContent="✅ 已複製";setTimeout(()=>b.innerHTML="🔗 分享",1500)});}</script>
<script>
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }
</script>
